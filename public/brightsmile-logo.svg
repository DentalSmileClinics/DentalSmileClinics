<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <!-- Background gradient for icon -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A8C7E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D6B5E;stop-opacity:1" />
    </linearGradient>
    <!-- Shine on circle -->
    <radialGradient id="shine" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0D2137" flood-opacity="0.18"/>
    </filter>
    <!-- Subtle text shadow -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#0D2137" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- ── Icon circle background ── -->
  <circle cx="80" cy="80" r="68" fill="url(#iconGrad)" filter="url(#shadow)" />
  <circle cx="80" cy="80" r="68" fill="url(#shine)" />

  <!-- ── Tooth shape (single stylized tooth) ── -->
  <!-- 
    Tooth anatomy:
    - Wide crown with two cusps at top
    - Narrowing neck
    - Two roots at bottom
    All paths crafted on a ~60×80 grid centred at (80,75)
  -->
  <g transform="translate(80,78)" filter="url(#shadow)">
    <path d="
      M -22,-34
      C -22,-38 -14,-42 -6,-40
      C -2,-39 0,-36 0,-36
      C 0,-36 2,-39 6,-40
      C 14,-42 22,-38 22,-34
      C 26,-26 24,-14 20,-4
      C 17,4  16,12  16,20
      C 16,26 14,34 10,38
      C 8,42  4,42  2,38
      C 0,34  0,28  0,28
      C 0,28  0,34  -2,38
      C -4,42 -8,42 -10,38
      C -14,34 -16,26 -16,20
      C -16,12 -17,4  -20,-4
      C -24,-14 -26,-26 -22,-34
      Z
    "
    fill="#FFFFFF"
    stroke="#E0F5F2"
    stroke-width="1.5"
    />
    <!-- Cusp highlight lines -->
    <line x1="-8" y1="-36" x2="-4" y2="-20" stroke="#D6F0EC" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="8"  y1="-36" x2="4"  y2="-20" stroke="#D6F0EC" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Shine spot on crown -->
    <ellipse cx="-7" cy="-28" rx="4" ry="7" fill="white" opacity="0.35" transform="rotate(-10,-7,-28)"/>
  </g>

  <!-- ── Decorative sparkle dots ── -->
  <circle cx="122" cy="30" r="3.5" fill="#C9993A" opacity="0.85"/>
  <circle cx="132" cy="22" r="2"   fill="#C9993A" opacity="0.6"/>
  <circle cx="126" cy="20" r="1.5" fill="#C9993A" opacity="0.45"/>

  <!-- ── Wordmark: BrightSmile ── -->
  <text
    x="158" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    fill="#0D2137"
    filter="url(#textShadow)"
    letter-spacing="-0.5"
  >Bright<tspan fill="#1A8C7E">Smile</tspan></text>

  <!-- ── Tagline ── -->
  <text
    x="160" y="96"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#6B7685"
    letter-spacing="3.5"
  >DENTAL CARE</text>

  <!-- ── Thin rule between name and tagline (decorative) ── -->
  <line x1="160" y1="101" x2="345" y2="101" stroke="#D6F0EC" stroke-width="1.2"/>

  <!-- ── Gold accent dot beside tagline ── -->
  <circle cx="352" cy="97" r="3" fill="#C9993A" opacity="0.8"/>

</svg>
